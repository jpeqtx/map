<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPEQ Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin:0; }
        #map { width:100vw; height:100vh; }
        .legend {
            background: white;
            padding: 10px 14px;
            border-radius: 6px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.3);
            font-family: sans-serif;
            font-size: 13px;
            line-height: 1.6;
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
        }
        .legend-item { display: flex; align-items: center; margin: 2px 0; }
        .legend-color {
            width: 18px; height: 18px;
            border-radius: 50%;
            margin-right: 8px;
            border: 1px solid #666;
        }
        /* Leaflet カスタムコントロール用のスタイル */
        .osm-attribution-control {
            background: rgba(255,255,255,0.9);
            padding: 2px 6px;
            font-size: 10px;
            font-family: sans-serif;
            border-radius: 0 0 0 3px;
            box-shadow: 0 0 3px rgba(0,0,0,0.3);
            line-height: 1.4;
            white-space: nowrap;
        }
        .osm-attribution-control a {
            color: #0078d4;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="legend" id="legend" style="display:none;">
        <div class="legend-item"><div class="legend-color" style="background:rgba(255,0,0,0.5);"></div> Storm Area</div>
        <div class="legend-item"><div class="legend-color" style="background:rgba(255,165,0,0.4);"></div> Gale Area</div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const lat = parseFloat(params.get('lat'));
        const lng = parseFloat(params.get('lng'));
        const storm = parseFloat(params.get('storm'));
        const gale = parseFloat(params.get('gale'));
        const type = params.get('type');
        const isEpicenter = (type === 'epicenter') || (!storm && !gale);

        document.title = isEpicenter ? 'Epicenter' : 'Typhoon Wind Areas';

        const map = L.map('map', {
            attributionControl: false
        }).setView([35, 135], 5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18
        }).addTo(map);

        // ★ Leaflet カスタムコントロールとして右上に配置
        const OsmAttribution = L.Control.extend({
            options: {
                position: 'topright'
            },
            onAdd: function (map) {
                const div = L.DomUtil.create('div', 'osm-attribution-control');
                div.innerHTML = '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> contributors';
                return div;
            }
        });
        new OsmAttribution().addTo(map);

        if (!isNaN(lat) && !isNaN(lng)) {
            map.setView([lat, lng], 7);
            const marker = L.marker([lat, lng]).addTo(map);

            if (isEpicenter) {
                marker.bindTooltip('Epicenter', {
                    permanent: true,
                    direction: 'top',
                    offset: [0, -10]
                });
            } else {
                marker.bindTooltip('Near the center of the typhoon', {
                    permanent: true,
                    direction: 'top',
                    offset: [0, -10]
                });
                marker.bindPopup('Typhoon Center');

                let hasCircles = false;
                if (!isNaN(gale) && gale > 0) {
                    L.circle([lat, lng], {
                        radius: gale * 1000,
                        color: 'orange',
                        fillOpacity: 0.15
                    }).addTo(map).bindPopup(`Gale Area: ${gale} km radius`);
                    hasCircles = true;
                }
                if (!isNaN(storm) && storm > 0) {
                    L.circle([lat, lng], {
                        radius: storm * 1000,
                        color: 'red',
                        fillOpacity: 0.25
                    }).addTo(map).bindPopup(`Storm Area: ${storm} km radius`);
                    hasCircles = true;
                }
                if (hasCircles) {
                    document.getElementById('legend').style.display = 'block';
                }
            }
        } else {
            alert('Please provide lat and lng as URL parameters.');
        }
    </script>
</body>
</html>
